<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Fortune Wheel | Premium Rewards</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Luxury Header -->
        <header class="luxury-header">
            <h1 class="glitter-text">Fortune Wheel</h1>
            <p class="subtitle">Spin to win exclusive VIP rewards</p>
        </header>

        <!-- Main Wheel Section -->
        <main class="wheel-section">
            <div class="wheel-outer-ring">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="wheel-center">
                    <button id="spinBtn" class="spin-button">SPIN</button>
                </div>
            </div>
        </main>

        <!-- Prize Modal -->
        <div id="prizeModal" class="modal">
            <div class="modal-content glassmorphism">
                <span class="close-modal">&times;</span>
                <div class="prize-icon" id="prizeIcon">🏆</div>
                <h2>Congratulations!</h2>
                <p>You've won:</p>
                <h1 id="prizeName" class="winner-name">JACKPOT</h1>
                <button class="claim-btn">CLAIM NOW</button>
            </div>
        </div>

        <!-- Footer / Instructions -->
        <footer class="luxury-footer">
            <p>&copy; 2026 VIP LUXURY LOUNGE. ALL RIGHTS RESERVED.</p>
        </footer>
    </div>

    <!-- Probability Engine (Hidden/Obfuscated) -->
    <script src="js/probability-engine.js"></script>
    <!-- Main Wheel Logic -->
    <script src="js/wheel.js"></script>
</body>
</html>
